<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedVision AI — Cotizador</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── MedVision Brand Palette ───────────────────────────────────────────
       Primary:   Charcoal #54504C · Pale Oak #CEC5B7 · Alabaster #E5E4E3 · White Smoke #F2F2F2
       Secondary: Jasmine #F4E07A · Coffee Bean #66482D · Sunlit Clay #FCC377 · Willow Green #B3D389
    ─────────────────────────────────────────────────────────────────────── */
    :root {
      --bg:              #F2F2F2;        /* White Smoke — page background     */
      --surface:         #FFFFFF;        /* Pure white cards                  */
      --border:          #E5E4E3;        /* Alabaster Grey — borders          */
      --text:            #54504C;        /* Charcoal — primary text           */
      --muted:           #8A857F;        /* Charcoal 60% — secondary text     */
      --hint:            #CEC5B7;        /* Pale Oak — placeholders           */

      --accent:          #54504C;        /* Charcoal — primary actions        */
      --accent-hover:    #3A3632;        /* Charcoal dark — hover             */
      --accent-light:    #F7F5F2;        /* Pale Oak tinted — selected bg     */
      --accent-border:   #CEC5B7;        /* Pale Oak — selected border        */

      --highlight:       #F4E07A;        /* Jasmine — progress fill & badges  */
      --highlight-text:  #66482D;        /* Coffee Bean — text on jasmine     */
      --green:           #B3D389;        /* Willow Green — success states     */
      --warm:            #FCC377;        /* Sunlit Clay — warm accents        */

      --radius:          12px;
      --radius-sm:       8px;
      --shadow:          0 2px 16px rgba(84,80,76,.10);
      --shadow-card:     0 4px 24px rgba(84,80,76,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 100px;
    }

    /* ─── Shell ─────────────────────────────────────────────────────────── */
    .shell { width: 100%; max-width: 700px; }

    /* ─── Header band ───────────────────────────────────────────────────── */
    .header-band {
      background: var(--text);           /* Charcoal */
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 20px 28px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0;
    }
    .brand-logo svg {
      height: 38px;
      width: auto;
      display: block;
    }
    .header-tagline {
      font-size: 12px;
      color: var(--hint);
      letter-spacing: .05em;
      text-align: right;
      line-height: 1.4;
    }

    /* ─── Progress ──────────────────────────────────────────────────────── */
    .progress-wrap {
      background: var(--accent);
      padding: 12px 28px 14px;
      margin-bottom: 24px;
      border-radius: 0 0 var(--radius) var(--radius);
      box-shadow: var(--shadow);
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--hint);
      margin-bottom: 8px;
      font-weight: 500;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .progress-track {
      height: 4px;
      background: rgba(255,255,255,.15);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--highlight);      /* Jasmine */
      border-radius: 99px;
      transition: width .4s ease;
    }

    /* ─── Card ──────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-card);
    }
    .card-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--warm);                /* Sunlit Clay */
      margin-bottom: 6px;
    }
    .card-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.25;
    }
    .card-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.55;
    }

    /* ─── Form fields ────────────────────────────────────────────────────── */
    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field-full { grid-column: 1 / -1; }
    @media (max-width: 520px) { .field-grid { grid-template-columns: 1fr; } }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 13px; font-weight: 600; color: var(--text); }
    .field label .req { color: #d9534f; margin-left: 2px; }
    .field input,
    .field select {
      padding: 10px 13px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      transition: border-color .15s, box-shadow .15s;
      width: 100%;
    }
    .field input::placeholder { color: var(--hint); }
    .field input:focus,
    .field select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(84,80,76,.12);
    }
    .field input.err,
    .field select.err { border-color: #d9534f; }
    .field .err-msg { font-size: 11px; color: #d9534f; display: none; }
    .field.has-err .err-msg { display: block; }

    /* ─── Module grid ────────────────────────────────────────────────────── */
    .mod-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(188px, 1fr));
      gap: 10px;
    }
    .mod-card {
      position: relative;
      padding: 14px 14px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      background: var(--surface);
      transition: border-color .15s, background .15s, box-shadow .15s;
      user-select: none;
    }
    .mod-card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 8px rgba(84,80,76,.10);
    }
    .mod-card.on {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .mod-card.on::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--highlight);      /* Jasmine top stripe when selected */
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    }
    .mod-card input[type="checkbox"] {
      position: absolute; top: 12px; right: 12px;
      width: 15px; height: 15px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .mod-icon { font-size: 22px; display: block; margin-bottom: 8px; }
    .mod-name { font-size: 13px; font-weight: 600; padding-right: 20px; line-height: 1.3; color: var(--text); }
    .mod-desc { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; }

    /* ─── Select-all bar ─────────────────────────────────────────────────── */
    .sel-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
      padding: 10px 14px;
      background: var(--accent-light);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius-sm);
    }
    .sel-bar-count { font-size: 13px; color: var(--muted); }
    .sel-bar-count strong { color: var(--text); }
    .toggle-all {
      font-size: 12px;
      color: var(--accent);
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      font-weight: 600;
      text-decoration: underline;
    }

    /* ─── Nav buttons ────────────────────────────────────────────────────── */
    .nav {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 28px; gap: 12px;
    }
    .btn-back {
      padding: 11px 22px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .btn-back:hover {
      background: var(--bg);
      border-color: var(--accent);
      color: var(--text);
    }
    .btn-next {
      flex: 1;
      padding: 12px;
      background: var(--accent);        /* Charcoal */
      color: var(--highlight);          /* Jasmine text on charcoal */
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .02em;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn-next:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }
    .btn-next:active { transform: translateY(0); }

    /* ─── Summary ────────────────────────────────────────────────────────── */
    .summary-section { margin-bottom: 20px; }
    .summary-cat {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--hint);
      margin-bottom: 10px;
    }
    .summary-chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 11px;
      background: var(--accent-light);
      border: 1px solid var(--accent-border);
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
    }
    .summary-clinic-row {
      display: flex; justify-content: space-between;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .summary-clinic-row:last-child { border-bottom: none; }
    .summary-clinic-row span:first-child { color: var(--muted); }
    .summary-clinic-row span:last-child { font-weight: 600; color: var(--text); }

    /* ─── Total badge ────────────────────────────────────────────────────── */
    .total-badge {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--accent);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      margin-top: 24px;
    }
    .total-badge-label { font-size: 13px; color: var(--hint); font-weight: 500; }
    .total-badge-count { font-size: 24px; font-weight: 800; color: var(--highlight); }

    /* ─── Finish screen ──────────────────────────────────────────────────── */
    .finish {
      text-align: center;
      padding: 48px 24px;
    }
    .finish-icon { font-size: 52px; margin-bottom: 20px; display: block; }
    .finish h2 { font-size: 24px; font-weight: 700; margin-bottom: 10px; color: var(--text); }
    .finish p {
      font-size: 14px; color: var(--muted);
      max-width: 420px; margin: 0 auto 28px;
      line-height: 1.65;
    }
    .finish-pill {
      display: inline-block;
      background: var(--green);
      color: #3a5c1a;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 99px;
      margin-bottom: 20px;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    /* ─── Divider ────────────────────────────────────────────────────────── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    /* ─── Module card icon ─── */
    .mod-icon {
      display: block;
      width: 28px;
      height: 28px;
      margin-bottom: 10px;
      color: var(--accent);
      flex-shrink: 0;
    }
    .mod-card.on .mod-icon { color: var(--accent); }
    .mod-icon svg {
      width: 100%;
      height: 100%;
    }

    /* ─── Multi-clinic section ─── */
    .clinics-section {
      margin-top: 24px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }
    .clinics-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .clinics-header label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .clinics-count-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .clinics-count-row select {
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      width: 100%;
      transition: border-color .15s;
    }
    .clinics-count-row select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(84,80,76,.12);
    }
    .clinic-block {
      background: var(--accent-light);
      border: 1.5px solid var(--accent-border);
      border-radius: var(--radius-sm);
      padding: 16px 18px;
      margin-bottom: 12px;
    }
    .clinic-block-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .clinic-block-title svg {
      width: 14px; height: 14px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
    .clinic-block-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 480px) { .clinic-block-grid { grid-template-columns: 1fr; } }
    .clinic-block-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .clinic-block-field label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }
    .clinic-block-field input {
      padding: 8px 11px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      width: 100%;
      transition: border-color .15s;
    }
    .clinic-block-field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(84,80,76,.12);
    }
    .clinic-block-field input.err { border-color: #d9534f; }
    .staff-breakdown {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding-top: 4px;
    }
    .staff-total-row {
      grid-column: 1 / -1;
      font-size: 12px;
      color: var(--muted);
      text-align: right;
      padding-top: 2px;
    }
    .staff-total-row strong { color: var(--text); }
    .staff-total-row.warn strong { color: #d9534f; }
    .clinic-name-full { grid-column: 1 / -1; }

    /* ─── Specialty badge ───────────────────────────────────────────────── */
    .mod-specialty {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--highlight-text);
      background: var(--highlight);
      padding: 2px 8px;
      border-radius: 99px;
      margin-bottom: 8px;
    }

    /* ─── Clinical specialty reveal ─────────────────────────────────────── */
    .clinical-reveal {
      display: none;
      grid-column: 1 / -1;
      background: var(--accent-light);
      border: 1.5px solid var(--accent-border);
      border-radius: var(--radius-sm);
      padding: 16px 18px;
      margin-top: 4px;
      animation: fadeIn .2s ease;
    }
    .clinical-reveal.visible { display: block; }
    .clinical-reveal label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      display: block;
      margin-bottom: 10px;
    }
    .specialty-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .specialty-chip {
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      background: var(--surface);
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none;
    }
    .specialty-chip:hover { border-color: var(--accent); }
    .specialty-chip.on {
      background: var(--accent);
      color: var(--highlight);
      border-color: var(--accent);
      font-weight: 700;
    }
    .clinical-reveal .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
    }

    /* ─── Tooltip ───────────────────────────────────────────────────────── */
    .mod-card { position: relative; }
    .mod-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      line-height: 1.5;
      padding: 10px 13px;
      border-radius: var(--radius-sm);
      box-shadow: 0 4px 16px rgba(84,80,76,.22);
      z-index: 100;
      pointer-events: none;
      white-space: normal;
    }
    .mod-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: var(--accent);
    }
    .mod-card:hover .mod-tooltip { display: block; }

    /* ─── Tooltip info button (mobile) ─── */
    .mod-info-btn {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--hint);
      background: var(--surface);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      line-height: 17px;
      text-align: center;
      cursor: pointer;
      display: none;
      z-index: 10;
      user-select: none;
      transition: border-color .15s, color .15s;
    }
    .mod-info-btn:hover { border-color: var(--accent); color: var(--accent); }
    @media (hover: none) {
      .mod-info-btn { display: block; }
      .mod-tooltip { display: none !important; }
      .mod-tooltip.pinned { display: block !important; }
    }

    /* ─── Tooltip overlay backdrop (mobile) ─── */
    .tooltip-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99;
    }
    .tooltip-backdrop.active { display: block; }

    /* ─── Accounting software reveal ─── */
    .accounting-reveal {
      display: none;
      grid-column: 1 / -1;
      background: var(--accent-light);
      border: 1.5px solid var(--accent-border);
      border-radius: var(--radius-sm);
      padding: 16px 18px;
      margin-top: 4px;
      animation: fadeIn .2s ease;
    }
    .accounting-reveal.visible { display: block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
    .accounting-reveal label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      display: block;
      margin-bottom: 8px;
    }
    .accounting-reveal select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      transition: border-color .15s;
    }
    .accounting-reveal select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(84,80,76,.12);
    }
    .accounting-reveal .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 7px;
    }

    /* ─── Coming soon module card ─── */
    .mod-card.coming-soon {
      opacity: 0.62;
      cursor: not-allowed;
      pointer-events: none;
      position: relative;
    }
    .mod-card.coming-soon::before {
      content: 'Próximamente';
      position: absolute;
      top: 8px; right: 8px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      background: var(--warm);
      color: var(--highlight-text, #66482d);
      padding: 2px 7px;
      border-radius: 99px;
      z-index: 2;
    }
    .mod-card.coming-soon .mod-name { color: var(--muted); }

    /* ─── "Otra especialidad" reveal field ─── */
    .field-reveal {
      grid-column: 1 / -1;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height .3s ease, opacity .25s ease, margin-top .25s ease;
      margin-top: 0;
    }
    .field-reveal.visible {
      max-height: 80px;
      opacity: 1;
      margin-top: 0;
    }

    /* ─── Clinic block field error state ─── */
    .clinic-block-field input.blk-err {
      border-color: #d9534f;
    }
    .blk-err-msg {
      font-size: 11px;
      color: #d9534f;
      margin-top: 3px;
      display: none;
    }
    .clinic-block-field.has-blk-err .blk-err-msg { display: block; }
    .clinic-block-field.has-blk-err input { border-color: #d9534f; }
    .clinic-block.has-block-err {
      border-color: #d9534f;
    }

    /* ─── "Otro país" reveal (inline, same row width) ─── */
    .otro-pais-wrap {
      display: none;
      margin-top: 10px;
    }
    .otro-pais-wrap.visible { display: block; }
  </style>
</head>

const TOTAL_STEPS = 1 + CAT_STEPS.length + 1;
let currentStep = 0;
const selected = {};
CAT_STEPS.forEach(c => selected[c.id] = new Set());
let clinicData = {};

function updateProgress() {
  const pct = Math.round((currentStep / (TOTAL_STEPS - 1)) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('pct').textContent = pct + '%';
  if (currentStep === 0) {
    document.getElementById('stepLabel').textContent = 'Información de la clínica';
  } else if (currentStep <= CAT_STEPS.length) {
    document.getElementById('stepLabel').textContent = `Módulos — Paso ${currentStep} de ${CAT_STEPS.length}`;
  } else {
    document.getElementById('stepLabel').textContent = 'Resumen final';
  }
}

function render() {
  updateProgress();
  const container = document.getElementById('stepContainer');
  if (currentStep === 0) {
    renderClinic(container);
  } else if (currentStep <= CAT_STEPS.length) {
    renderCat(container, CAT_STEPS[currentStep - 1]);
  } else {
    renderSummary(container);
  }
}

function updateClinicBlocks(restoring = false) {
  const count = parseInt(document.getElementById('clinic_count').value) || 1;
  const container = document.getElementById('clinic-blocks');
  const prev = (clinicData.clinics && restoring) ? clinicData.clinics : [];

  let html_blocks = '';
  for (let i = 0; i < count; i++) {
    const p = prev[i] || {};
    const defaultName = count === 1 ? (clinicData.name || '') : '';
    html_blocks += `
    <div class="clinic-block" id="block-${i}">
      <div class="clinic-block-title">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Clínica ${i + 1}
      </div>
      <div class="clinic-block-grid">
        <div class="clinic-block-field clinic-name-full">
          <label>Nombre de la clínica ${i + 1} <span style="color:#d9534f">*</span></label>
          <input type="text" id="cname-${i}" placeholder="Ej: Sede Norte" value="${p.name || defaultName}">
          <span class="blk-err-msg"></span>
        </div>
        <div class="clinic-block-field">
          <label>Médicos / Doctores <span style="color:#d9534f">*</span></label>
          <input type="number" id="cdoc-${i}" min="0" placeholder="0"
            value="${p.doctors !== undefined && p.doctors !== 0 ? p.doctors : ''}"
            oninput="recalcStaff(${i})">
        </div>
        <div class="clinic-block-field">
          <label>Personal administrativo <span style="color:#d9534f">*</span></label>
          <input type="number" id="cadmin-${i}" min="0" placeholder="0"
            value="${p.admin !== undefined ? p.admin : ''}"
            oninput="recalcStaff(${i})">
        </div>
        <div class="staff-total-row" id="ctotal-${i}">
          Total colaboradores: <strong>0</strong>
        </div>
      </div>
    </div>`;
  }
  container.innerHTML = html_blocks;

  // Re-run totals for restored values
  for (let i = 0; i < count; i++) recalcStaff(i);
}

function recalcStaff(i) {
  const doc   = parseInt(document.getElementById(`cdoc-${i}`).value)   || 0;
  const admin = parseInt(document.getElementById(`cadmin-${i}`).value) || 0;
  const total = doc + admin;
  const row   = document.getElementById(`ctotal-${i}`);
  row.innerHTML = `Total colaboradores: <strong>${total}</strong>`;
  row.className = 'staff-total-row' + (total === 0 ? ' warn' : '');
}




function toggleOtroPais(val) {
  const wrap = document.getElementById('otro-pais-wrap');
  if (!wrap) return;
  if (val === 'Otro') {
    wrap.classList.add('visible');
  } else {
    wrap.classList.remove('visible');
    const inp = document.getElementById('clinic_otro_pais');
    if (inp) inp.value = '';
  }
}
function toggleOtraEspecialidad(val) {
  const wrap = document.getElementById('f-otra-wrap');
  if (!wrap) return;
  if (val === 'Otra') {
    wrap.classList.add('visible');
  } else {
    wrap.classList.remove('visible');
    const inp = document.getElementById('clinic_otra');
    if (inp) inp.value = '';
  }
}
function submitClinic() {
  const fields = [
    {id:'f-cname',      input:'clinic_name',      validate: v => v.trim() !== ''},
    {id:'f-cemail',     input:'clinic_email',      validate: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)},
    {id:'f-cphone',     input:'clinic_phone',      validate: v => v.trim() !== ''},
    {id:'f-ccountry',   input:'clinic_country',    validate: v => v !== ''},
    {id:'f-cspecialty', input:'clinic_specialty',  validate: v => v !== ''},
    ...(document.getElementById('clinic_country').value === 'Otro'
      ? [{id:'f-cotropais', input:'clinic_otro_pais', validate: v => v.trim() !== ''}]
      : []),
    ...(document.getElementById('clinic_specialty').value === 'Otra'
      ? [{id:'f-cotra', input:'clinic_otra', validate: v => v.trim() !== ''}]
      : []),
  ];
  let ok = true;
  fields.forEach(f => {
    const wrap = document.getElementById(f.id);
    const inp  = document.getElementById(f.input);
    wrap.classList.remove('has-err');
    if (!f.validate(inp.value)) { wrap.classList.add('has-err'); ok = false; }
  });
  if (!ok) return;
  // ── Validate clinic blocks ──────────────────────────────────────────────
  const clinicCount = parseInt(document.getElementById('clinic_count').value) || 1;
  const clinicsArr = [];
  let blocksOk = true;

  for (let i = 0; i < clinicCount; i++) {
    const nameEl  = document.getElementById(`cname-${i}`);
    const docEl   = document.getElementById(`cdoc-${i}`);
    const adminEl = document.getElementById(`cadmin-${i}`);
    const block   = document.getElementById(`block-${i}`);

    // Helper: mark field error inside block
    const markBlkField = (el, fieldEl, hasErr) => {
      const wrap = fieldEl ? fieldEl.closest('.clinic-block-field') : null;
      if (!wrap) return;
      if (hasErr) {
        wrap.classList.add('has-blk-err');
        let msg = wrap.querySelector('.blk-err-msg');
        if (!msg) { msg = document.createElement('span'); msg.className = 'blk-err-msg'; wrap.appendChild(msg); }
        msg.textContent = 'Campo requerido.';
      } else {
        wrap.classList.remove('has-blk-err');
      }
    };

    const nameVal  = nameEl  ? nameEl.value.trim()        : '';
    const docVal   = docEl   ? parseInt(docEl.value)      : NaN;
    const adminVal = adminEl ? parseInt(adminEl.value)    : NaN;

    let blockErr = false;
    if (!nameVal)           { markBlkField(block, nameEl, true);  blockErr = true; } else { markBlkField(block, nameEl, false); }
    if (isNaN(docVal)   || docEl.value.trim() === '')   { markBlkField(block, docEl, true);   blockErr = true; } else { markBlkField(block, docEl, false); }
    if (isNaN(adminVal) || adminEl.value.trim() === '') { markBlkField(block, adminEl, true);  blockErr = true; } else { markBlkField(block, adminEl, false); }

    if (blockErr) {
      blocksOk = false;
      if (block) block.classList.add('has-block-err');
    } else {
      if (block) block.classList.remove('has-block-err');
      clinicsArr.push({
        name:    nameVal,
        doctors: docVal,
        admin:   adminVal,
        total:   docVal + adminVal,
      });
    }
  }

  if (!blocksOk) { ok = false; }
  clinicData = {
    name:      document.getElementById('clinic_name').value,
    email:     document.getElementById('clinic_email').value,
    phone:     document.getElementById('clinic_phone').value,
    country:   document.getElementById('clinic_country').value,
    specialty: document.getElementById('clinic_specialty').value,
    otroPais: document.getElementById('clinic_country').value === 'Otro'
      ? document.getElementById('clinic_otro_pais').value.trim()
      : '',
    otraEspecialidad: document.getElementById('clinic_specialty').value === 'Otra'
      ? document.getElementById('clinic_otra').value.trim()
      : '',
    clinics:   clinicsArr,
  };
  currentStep = 1;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ─── Category step ─── */
function renderCat(container, cat) {
  const sel   = selected[cat.id];
  const total = cat.modules.length;
  container.innerHTML = `
  <div class="card">
    <div class="card-eyebrow">${cat.eyebrow}</div>
    <div class="card-title">${cat.title}</div>
    <div class="card-sub">${cat.sub}</div>
    <div class="sel-bar">
      <span class="sel-bar-count"><strong id="selN">${sel.size}</strong> de ${total} seleccionados</span>
      <button class="toggle-all" onclick="toggleAll('${cat.id}', ${total})" id="toggleAllBtn">${sel.size === total ? 'Deseleccionar todos' : 'Seleccionar todos'}</button>
    </div>
    <div class="mod-grid" id="modGrid">
      ${cat.modules.map(m => `
        <div class="mod-card ${sel.has(m.code)?'on':''}" onclick="toggleMod('${cat.id}','${m.code}',${total})" data-code="${m.code}">
          ${m.tooltip ? `<div class="mod-tooltip">${m.tooltip}</div>` : ''}
          <input type="checkbox" ${sel.has(m.code)?'checked':''} onclick="event.stopPropagation();toggleMod('${cat.id}','${m.code}',${total})">
          <span class="mod-icon">${ICONS[m.code] || ''}</span>
          <div class="mod-name">${m.name}</div>
          <div class="mod-desc">${m.desc}</div>
          ${m.tooltip ? `<span class="mod-info-btn" onclick="event.stopPropagation();showTooltip(this)">i</span>` : ''}
        </div>`).join('')}
      ${cat.id === 'finance' ? `
        <div class="accounting-reveal ${sel.has('accounting') ? 'visible' : ''}" id="accounting-software-wrap">
          <label>¿Tienes un software contable actual o deseas integrar con alguno?</label>
          <select id="accounting_software" onchange="clinicData.accountingSoftware=this.value">
            ${['','QuickBooks','Xero','Odoo','SAP','Peachtree / Sage 50','Zoho Books','Botonapp','Otro'].map(s=>`<option value="${s}" ${(clinicData.accountingSoftware===s)?'selected':''}>${s||'— Seleccionar software —'}</option>`).join('')}
          </select>
          <p class="hint">Esta información nos ayuda a planificar la integración con tu sistema actual.</p>
        </div>` : ''}
      ${cat.id === 'comms' ? `
      <div class="mod-card coming-soon">
        <span class="mod-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        </span>
        <div class="mod-name">WhatsApp con IA</div>
        <div class="mod-desc">Atención automatizada, notificaciones y seguimiento de pacientes por WhatsApp</div>
      </div>` : ''}
    </div>
    <div class="nav">
      <button class="btn-back" onclick="goBack()">← Atrás</button>
      <button class="btn-next" onclick="nextStep()">Continuar →</button>
    </div>
  </div>`;
}

function toggleMod(catId, code, total) {
  const sel  = selected[catId];
  const card = document.querySelector(`[data-code="${code}"]`);
  const cb   = card.querySelector('input');
  if (sel.has(code)) { sel.delete(code); card.classList.remove('on'); cb.checked = false; }
  else               { sel.add(code);    card.classList.add('on');    cb.checked = true;  }
  document.getElementById('selN').textContent = sel.size;
  document.getElementById('toggleAllBtn').textContent = sel.size === total ? 'Deseleccionar todos' : 'Seleccionar todos';
  // Show/hide accounting software selector
  if (code === 'accounting') {
    const wrap = document.getElementById('accounting-software-wrap');
    if (wrap) {
      if (sel.has('accounting')) { wrap.classList.add('visible'); }
      else { wrap.classList.remove('visible'); clinicData.accountingSoftware = ''; }
    }
  }
  // Show/hide clinical specialty selector
  const clinicalWrap = document.getElementById('clinical-specialty-wrap');
  if (clinicalWrap) {
    if (sel.size > 0) { clinicalWrap.classList.add('visible'); }
    else { clinicalWrap.classList.remove('visible'); clinicData.clinicalSpecialties = []; }
  }
}

function toggleClinicalSpecialty(name) {
  if (!clinicData.clinicalSpecialties) clinicData.clinicalSpecialties = [];
  const arr = clinicData.clinicalSpecialties;
  const idx = arr.indexOf(name);
  if (idx > -1) { arr.splice(idx, 1); }
  else { arr.push(name); }
  // Update chip UI
  document.querySelectorAll('.specialty-chip').forEach(chip => {
    chip.classList.toggle('on', arr.includes(chip.textContent.trim()));
  });
}

function toggleAll(catId, total) {
  const sel  = selected[catId];
  const cat  = CAT_STEPS.find(c => c.id === catId);
  const allOn = sel.size === total;
  cat.modules.forEach(m => {
    const card = document.querySelector(`[data-code="${m.code}"]`);
    const cb   = card.querySelector('input');
    if (allOn) { sel.delete(m.code); card.classList.remove('on'); cb.checked = false; }
    else       { sel.add(m.code);    card.classList.add('on');    cb.checked = true;  }
  });
  document.getElementById('selN').textContent = sel.size;
  document.getElementById('toggleAllBtn').textContent = allOn ? 'Seleccionar todos' : 'Deseleccionar todos';
}

/* ─── Summary ─── */
function renderSummary(container) {
  const totalMods = Object.values(selected).reduce((a, s) => a + s.size, 0);

  let clinicRows = `
    <div class="summary-clinic-row"><span>Contacto</span><span>${clinicData.name}</span></div>
    <div class="summary-clinic-row"><span>Correo</span><span>${clinicData.email}</span></div>
    <div class="summary-clinic-row"><span>Teléfono</span><span>${clinicData.phone}</span></div>
    <div class="summary-clinic-row"><span>País</span><span>${clinicData.country === 'Otro' && clinicData.otroPais ? clinicData.otroPais : clinicData.country}</span></div>
    <div class="summary-clinic-row"><span>Especialidad</span><span>${clinicData.specialty === 'Otra' && clinicData.otraEspecialidad ? clinicData.otraEspecialidad : clinicData.specialty}</span></div>
    ${clinicData.clinics && clinicData.clinics.length > 0 ? `
      <div class="summary-clinic-row">
        <span>Sedes</span>
        <span>${clinicData.clinics.length} clínica${clinicData.clinics.length > 1 ? 's' : ''}</span>
      </div>
      ${clinicData.clinics.map((c, i) => `
        <div class="summary-clinic-row" style="padding-left:12px;border-left:2px solid var(--accent-border);">
          <span style="color:var(--text);font-weight:500;">${c.name || 'Clínica ' + (i+1)}</span>
          <span>${c.doctors} médico${c.doctors!==1?'s':''} · ${c.admin} admin · <strong>${c.total} total</strong></span>
        </div>`).join('')}
    ` : ''}
  `;

  let modSections = '';
  CAT_STEPS.forEach(cat => {
    const mods = cat.modules.filter(m => selected[cat.id].has(m.code));
    if (!mods.length) return;
    modSections += `
      <div class="summary-section">
        <div class="summary-cat">${cat.title}</div>
        <div class="summary-chips">
          ${mods.map(m => `<span class="chip">${m.icon} ${m.name}</span>`).join('')}
        </div>
      </div>`;
  });

  if (!modSections) {
    modSections = `<p style="font-size:13px;color:var(--muted);">No seleccionaste módulos adicionales.</p>`;
  }

  container.innerHTML = `
  <div class="card">
    <div class="card-eyebrow">Último paso</div>
    <div class="card-title">Resumen de tu cotización</div>
    <div class="card-sub">Revisa los detalles antes de enviar.</div>

    <div class="summary-section">
      <div class="summary-cat">Tu clínica</div>
      ${clinicRows}
    </div>

    <hr class="divider">

    <div class="summary-cat" style="margin-bottom:14px;">Módulos seleccionados</div>
    ${modSections}

    <div class="total-badge">
      <span class="total-badge-label">Total de módulos seleccionados</span>
      <span class="total-badge-count">${totalMods} módulos</span>
    </div>

    <div class="nav">
      <button class="btn-back" onclick="goBack()">← Atrás</button>
      <button class="btn-next" onclick="submitQuote()">Enviar cotización <svg style="display:inline-block;vertical-align:middle;margin-left:6px;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></button>
    </div>
  </div>`;
}

function goBack() {
  currentStep = Math.max(0, currentStep - 1);
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function nextStep() {
  currentStep++;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

async function submitQuote() {
  const totalMods = Object.values(selected).reduce((a, s) => a + s.size, 0);

  const payload = {
    clinic: {
      name:      clinicData.name,
      email:     clinicData.email,
      phone:     clinicData.phone,
      country:   clinicData.country === 'Otro' && clinicData.otroPais ? clinicData.otroPais : clinicData.country,
      specialty: clinicData.specialty === 'Otra' && clinicData.otraEspecialidad ? clinicData.otraEspecialidad : clinicData.specialty,
    },
    clinics:     clinicData.clinics,
    total_staff: clinicData.clinics ? clinicData.clinics.reduce((a,c)=>a+c.total,0) : 0,
    modules: Object.fromEntries(CAT_STEPS.map(c => [c.id, [...selected[c.id]]])),
    total_modules: totalMods,
    accounting_software: clinicData.accountingSoftware || null,
    clinical_specialties: clinicData.clinicalSpecialties || [],
  };

  const btn = document.querySelector('.nav .btn-next');
  if (btn) { btn.disabled = true; btn.textContent = 'Enviando…'; }

  try {
    const res = await fetch('/api/quote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error('Server error ' + res.status);
  } catch (err) {
    console.error('Quote error:', err);
    if (btn) { btn.disabled = false; btn.textContent = 'Enviar cotización 🚀'; }
    alert('Hubo un error al enviar tu cotización. Por favor intenta de nuevo.');
    return;
  }

  const container = document.getElementById('stepContainer');
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('pct').textContent = '100%';
  document.getElementById('stepLabel').textContent = '¡Listo!';
  container.innerHTML = `
    <div class="card">
      <div class="finish">
        <span class="finish-icon">🎉</span>
        <div class="finish-pill">✓ Solicitud recibida</div>
        <h2>¡Cotización enviada!</h2>
        <p>Recibimos tu solicitud con <strong>${totalMods} módulos</strong> seleccionados para <strong>${clinicData.name}</strong>. Te contactaremos pronto a <strong>${clinicData.email}</strong>.</p>
        <button class="btn-next" style="max-width:240px;margin:0 auto;display:block;" onclick="restartQuote()">Nueva cotización</button>
      </div>
    </div>`;
}

function restartQuote() {
  currentStep = 0;
  clinicData  = {};
  CAT_STEPS.forEach(c => selected[c.id] = new Set());
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

let _activeTooltip = null;

function showTooltip(btn) {
  hideTooltip();
  const tip = btn.closest('.mod-card').querySelector('.mod-tooltip');
  if (!tip) return;
  tip.classList.add('pinned');
  document.getElementById('tooltipBackdrop').classList.add('active');
  _activeTooltip = tip;
}

function hideTooltip() {
  if (_activeTooltip) { _activeTooltip.classList.remove('pinned'); _activeTooltip = null; }
  document.getElementById('tooltipBackdrop').classList.remove('active');
}

render();
</script>
</body>
</html>
